<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 מפתח הטבע</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(160deg, #1a3a0a 0%, #2d6a20 40%, #5a7830 70%, #8a6020 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        .wrapper {
            max-width: 560px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }
        h1 {
            color: white;
            font-size: 2em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            margin-bottom: 8px;
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1em;
            margin-bottom: 42px;
        }
        .cards {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            border-radius: 22px;
            padding: 36px 28px;
            width: 220px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 16px 48px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: block;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }
        .card:active {
            transform: translateY(-2px);
        }
        .card-icon {
            font-size: 3.5em;
            margin-bottom: 14px;
            display: block;
        }
        .card-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 0.82em;
            color: #666;
            line-height: 1.5;
        }
        .card-plants .card-title { color: #1a5a1a; }
        .card-plants { border-top: 5px solid #2d7a2d; }
        .card-rocks  .card-title { color: #5a3010; }
        .card-rocks  { border-top: 5px solid #8a5828; }
        .card-plants .card-btn {
            display: inline-block;
            margin-top: 16px;
            background: #2d7a2d;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .card-rocks .card-btn {
            display: inline-block;
            margin-top: 16px;
            background: #8a5828;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .footer {
            margin-top: 36px;
            color: rgba(255,255,255,0.5);
            font-size: 0.78em;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="logo">🔍</div>
    <h1>מפתח הטבע</h1>
    <p class="subtitle">בחר מה ברצונך לזהות</p>

    <div class="cards">
        <a href="plants.html" class="card card-plants">
            <span class="card-icon">🌿</span>
            <div class="card-title">זיהוי צמחים</div>
            <div class="card-desc">
                8 צמחי חורש ים-תיכוני —
                קידה, רתמה, אורן, אלון, לוטם, חרוב, אלת המסטיק, אלה
            </div>
            <span class="card-btn">▶ התחל</span>
        </a>

        <a href="rocks.html" class="card card-rocks">
            <span class="card-icon">🪨</span>
            <div class="card-title">זיהוי סלעים</div>
            <div class="card-desc">
                5 סלעים —
                כורכר, קירטון, גיר, דולומיט, צור
            </div>
            <span class="card-btn">▶ התחל</span>
        </a>
    </div>

    <p class="footer">מפתח אינטראקטיבי · קורס מדריכי טיולים</p>
</div>
</body>
</html>
