<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 מפתח לזיהוי צמחים</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a4a1a 0%, #2d7a2d 50%, #1a6b3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .wrapper { max-width: 640px; width: 100%; }
        .header { text-align: center; color: white; margin-bottom: 22px; }
        .header h1 { font-size: 1.8em; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .header p { font-size: 0.88em; opacity: 0.85; margin-top: 5px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 32px 30px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        /* Trail */
        .trail { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; min-height: 26px; align-items: center; }
        .trail-item { font-size: 0.75em; background: #e8f5e8; color: #2d7a2d; padding: 3px 10px; border-radius: 20px; border: 1px solid #c3e6c3; }
        .trail-arrow { color: #aaa; font-size: 0.8em; }
        /* Progress */
        .progress-bar { height: 4px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #2d7a2d, #5abf5a); border-radius: 4px; transition: width 0.4s ease; }
        /* Question */
        .q-label { font-size: 0.8em; color: #999; margin-bottom: 5px; }
        .question-box {
            font-size: 1.1em; color: #1a1a1a; line-height: 1.7;
            margin-bottom: 22px; padding: 16px 18px;
            background: #f4fbf4; border-radius: 12px;
            border-right: 5px solid #2d7a2d;
        }
        /* Leaf hint area */
        .leaf-hint {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed #c3e6c3;
        }
        .leaf-hint-item {
            text-align: center;
        }
        .leaf-hint-item svg {
            display: block;
            margin: 0 auto;
        }
        .leaf-hint-label {
            font-size: 0.7em;
            color: #888;
            margin-top: 4px;
        }
        /* Options */
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 14px 18px; border: 2px solid #ddd;
            border-radius: 12px; background: white;
            cursor: pointer; font-size: 1em;
            text-align: right; transition: all 0.2s ease;
            color: #333; line-height: 1.4;
        }
        .option-btn:hover {
            border-color: #2d7a2d; background: #f4fbf4;
            transform: translateX(-4px);
            box-shadow: 0 4px 12px rgba(45,122,45,0.15);
        }
        .option-btn:active { transform: translateX(-2px); }
        /* Reset */
        .reset-btn {
            background: none; border: 2px solid #ccc;
            color: #888; padding: 9px 20px;
            border-radius: 10px; cursor: pointer;
            font-size: 0.88em; margin-top: 18px;
            display: block; transition: all 0.2s;
        }
        .reset-btn:hover { border-color: #888; color: #444; }
        /* Result */
        .result { text-align: center; }
        .result-check { font-size: 0.95em; color: #2d7a2d; font-weight: 600; margin-bottom: 10px; }
        .plant-emoji { font-size: 3.5em; margin-bottom: 10px; display: block; }
        .plant-name-he { font-size: 2em; color: #1a4a1a; font-weight: bold; margin-bottom: 4px; }
        .plant-name-latin { font-size: 0.95em; color: #888; font-style: italic; margin-bottom: 18px; }
        .plant-leaf-art {
            display: flex; justify-content: center;
            margin-bottom: 16px;
        }
        .plant-leaf-art svg { filter: drop-shadow(0 2px 4px rgba(45,122,45,0.25)); }
        .plant-desc {
            color: #555; line-height: 1.7; font-size: 0.95em;
            background: #f4fbf4; padding: 14px 18px;
            border-radius: 12px; text-align: right;
            margin-bottom: 22px;
        }
        .result-reset-btn {
            background: #2d7a2d; color: white; border: none;
            padding: 12px 32px; border-radius: 12px;
            cursor: pointer; font-size: 1em;
            transition: background 0.2s;
        }
        .result-reset-btn:hover { background: #1a5a1a; }
    </style>
</head>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let history = [];
let currentQ = 'q1';
const TOTAL_MAX = 6;

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderTrail() {
    const el = document.getElementById('trail');
    if (!history.length) { el.innerHTML = ''; return; }
    el.innerHTML = history.map((h, i) =>
        (i > 0 ? '<span class="trail-arrow">›</span>' : '') +
        `<span class="trail-item">${h}</span>`
    ).join('');
}

function buildHint(hintArr) {
    if (!hintArr || !hintArr.length) return '';
    const items = hintArr.map(h =>
        `<div class="leaf-hint-item">${h.svg}<div class="leaf-hint-label">${h.label}</div></div>`
    ).join('');
    return `<div class="leaf-hint">${items}</div>`;
}

function render() {
    renderTrail();
    const node = tree[currentQ];
    if (!node) return;

    document.getElementById('progress').style.width =
        Math.min((history.length / TOTAL_MAX) * 100, 90) + '%';

    const optionsHtml = node.options.map((opt, i) => {
        if (opt.dead) return `<button class="option-btn" style="color:#bbb;cursor:default" disabled>${opt.text}</button>`;
        return `<button class="option-btn" onclick="answer(${i})">${opt.text}</button>`;
    }).join('');

    const resetHtml = history.length > 0
        ? `<button class="reset-btn" onclick="reset()">↩ התחל מחדש</button>` : '';

    document.getElementById('quiz').innerHTML = `
        <div class="q-label">שאלה ${node.num}</div>
        <div class="question-box">
            ${node.text}
            ${buildHint(node.hint)}
        </div>
        <div class="options">${optionsHtml}</div>
        ${resetHtml}
    `;
}

function answer(i) {
    const opt = tree[currentQ].options[i];
    const label = opt.text.replace(/[✓→🌵🌿🌾🌲🍂🌸🫘🍃🌼]/g, '').trim();
    history.push(label);
    if (opt.result) showResult(opt.result);
    else if (opt.next) { currentQ = opt.next; render(); }
}

function showResult(name) {
    const p = plants[name];
    document.getElementById('progress').style.width = '100%';
    renderTrail();
    document.getElementById('quiz').innerHTML = `
        <div class="result">
            <div class="result-check">✅ זוהה הצמח</div>
            <span class="plant-emoji">${p.emoji}</span>
            <div class="plant-name-he">${name}</div>
            <div class="plant-name-latin">${p.latin}</div>
            <div class="plant-leaf-art">${p.leafArt}</div>
            <div class="plant-desc">${p.desc}</div>
            <button class="result-reset-btn" onclick="reset()">🔄 זיהוי צמח חדש</button>
        </div>
    `;
}

function reset() {
    history = [];
    currentQ = 'q1';
    render();
}

render();
