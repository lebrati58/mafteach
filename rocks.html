        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #4a2c0a 0%, #8a5828 50%, #5c3c18 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .wrapper { max-width: 640px; width: 100%; }
        .header { text-align: center; color: white; margin-bottom: 22px; }
        .header h1 { font-size: 1.8em; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .header p { font-size: 0.88em; opacity: 0.85; margin-top: 5px; }
        .card {
            background: white; border-radius: 20px;
            padding: 32px 30px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
        }
        .trail { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; min-height: 26px; align-items: center; }
        .trail-item { font-size: 0.75em; background: #fdf0e0; color: #8a5828; padding: 3px 10px; border-radius: 20px; border: 1px solid #e8c898; }
        .trail-arrow { color: #aaa; font-size: 0.8em; }
        .progress-bar { height: 4px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #8a5828, #c8903a); border-radius: 4px; transition: width 0.4s ease; }
        .q-label { font-size: 0.8em; color: #999; margin-bottom: 5px; }
        .question-box {
            font-size: 1.1em; color: #1a1a1a; line-height: 1.7;
            margin-bottom: 22px; padding: 16px 18px;
            background: #fdf8f0; border-radius: 12px;
            border-right: 5px solid #8a5828;
        }
        .hint-area {
            display: flex; justify-content: center;
            align-items: flex-end; gap: 22px;
            margin-top: 14px; padding-top: 12px;
            border-top: 1px dashed #e8c898;
        }
        .hint-item { text-align: center; }
        .hint-item svg { display: block; margin: 0 auto; }
        .hint-label { font-size: 0.7em; color: #888; margin-top: 4px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 14px 18px; border: 2px solid #ddd;
            border-radius: 12px; background: white;
            cursor: pointer; font-size: 1em;
            text-align: right; transition: all 0.2s ease;
            color: #333; line-height: 1.4;
        }
        .option-btn:hover {
            border-color: #8a5828; background: #fdf8f0;
            transform: translateX(-4px);
            box-shadow: 0 4px 12px rgba(138,88,40,0.15);
        }
        .option-btn:active { transform: translateX(-2px); }
        .reset-btn {
            background: none; border: 2px solid #ccc;
            color: #888; padding: 9px 20px;
            border-radius: 10px; cursor: pointer;
            font-size: 0.88em; margin-top: 18px;
            display: block; transition: all 0.2s;
        }
        .reset-btn:hover { border-color: #888; color: #444; }
        /* Result */
        .result { text-align: center; }
        .result-check { font-size: 0.95em; color: #8a5828; font-weight: 600; margin-bottom: 10px; }
        .rock-name-he { font-size: 2.2em; color: #3a2008; font-weight: bold; margin-bottom: 4px; }
        .rock-name-latin { font-size: 0.95em; color: #888; font-style: italic; margin-bottom: 16px; }
        .rock-art { display: flex; justify-content: center; margin-bottom: 16px; }
        .rock-desc {
            color: #555; line-height: 1.7; font-size: 0.95em;
            background: #fdf8f0; padding: 14px 18px;
            border-radius: 12px; text-align: right; margin-bottom: 22px;
        }
        .result-reset-btn {
            background: #8a5828; color: white; border: none;
            padding: 12px 32px; border-radius: 12px;
            cursor: pointer; font-size: 1em; transition: background 0.2s;
        }
        .result-reset-btn:hover { background: #4a2c0a; }
        .nav-link {
            text-align: center; margin-top: 20px;
            padding-top: 16px; border-top: 1px solid #eee;
        }
        .nav-link a { color: #8a5828; font-size: 0.85em; text-decoration: none; }
        .nav-link a:hover { text-decoration: underline; }
    </style>
</head>

let history = [];
let currentQ = 'q1';
const TOTAL_MAX = 3;

function renderTrail() {
    const el = document.getElementById('trail');
    if (!history.length) { el.innerHTML = ''; return; }
    el.innerHTML = history.map((h, i) =>
        (i > 0 ? '<span class="trail-arrow">›</span>' : '') +
        `<span class="trail-item">${h}</span>`
    ).join('');
}

function buildHint(hints) {
    if (!hints || !hints.length) return '';
    return `<div class="hint-area">${
        hints.map(h =>
            `<div class="hint-item">${h.svg}<div class="hint-label">${h.label}</div></div>`
        ).join('')
    }</div>`;
}

function render() {
    renderTrail();
    const node = tree[currentQ];
    if (!node) return;
    document.getElementById('progress').style.width =
        Math.min((history.length / TOTAL_MAX) * 100, 90) + '%';
    document.getElementById('quiz').innerHTML = `
        <div class="q-label">שאלה ${node.num}</div>
        <div class="question-box">${node.text}${buildHint(node.hint)}</div>
        <div class="options">${node.options.map((o, i) =>
            `<button class="option-btn" onclick="answer(${i})">${o.text}</button>`
        ).join('')}</div>
        ${history.length > 0 ? '<button class="reset-btn" onclick="reset()">↩ התחל מחדש</button>' : ''}
    `;
}

function answer(i) {
    const opt = tree[currentQ].options[i];
    history.push(opt.text.replace(/[✓✗→🫧🪨]/g, '').trim());
    if (opt.result) showResult(opt.result);
    else { currentQ = opt.next; render(); }
}

function showResult(name) {
    const r = rocks[name];
    document.getElementById('progress').style.width = '100%';
    renderTrail();
    document.getElementById('quiz').innerHTML = `
        <div class="result">
            <div class="result-check">✅ זוהה הסלע</div>
            <div style="font-size:3.2em;margin-bottom:10px">${r.emoji}</div>
            <div class="rock-name-he">${name}</div>
            <div class="rock-name-latin">${r.latin}</div>
            <div class="rock-art">${r.art}</div>
            <div class="rock-desc">${r.desc}</div>
            <button class="result-reset-btn" onclick="reset()">🔄 זיהוי סלע חדש</button>
        </div>
    `;
}

function reset() { history = []; currentQ = 'q1'; render(); }

render();
</script>
</body>
</html>
